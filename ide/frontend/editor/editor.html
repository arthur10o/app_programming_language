<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A++ IDE - Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container editor-container">
        <header>
            <h1>Code editor</h1>
            <p>Write your code here, quickly and fluidly.</p>
        </header>

        <main>
            <div class="editor">
                <textarea placeholder="Start coding here..." id="code-editor"></textarea>
            </div>

            <div class="action-buttons">
                <button class="button" id="run-code">Run</button>
                <button class="button" id="save-code">Save</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 A++ IDE. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
