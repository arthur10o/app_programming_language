<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A++ IDE - Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container settings-container">
        <header>
            <h1>Settings</h1>
            <p>Customize your development environment according to your preferences.</p>
        </header>
        <main>
            <div class="settings">
                <div class="setting-item">
                    <label for="theme">Theme</label>
                    <select id="theme">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label for="font-size">Font Size</label>
                    <input type="range" id="font-size" min="10" max="30" step="1" value="16">
                </div>
                <div class="font-item">
                    <label for="font-family">Font Family</label>
                    <select id="font-family">
                        <option value="monospace">Monospace</option>
                        <option value="sans-serif">Sans-serif</option>
                        <option value="serif">Serif</option>
                    </select>
                </div>
                <div class="language-item">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="es">Spanish</option>
                    </select>
                </div>
                <!-- TODO: Ajouter la personnalisation des raccourcis clavier -->
                <!-- TODO: Ajouter la prévisualisation des modifications -->
                <!-- TODO: Ajouter la gestion des profils -->
                <!-- TODO: Ajouter fieldsets et légendes -->
                <div class="setting-item">
                    <label for="auto-save">Auto Save</label>
                    <input type="checkbox" id="auto-save">
                </div>
                    <div class="tabulation-size-item">
                    <label for="tabulation-size">Tabulation Size</label>
                    <input type="range" id="tabulation-size" min="1" max="8" value="4">
                </div>
                <div class="autocomplete-item">
                    <label for="autocomplete">Autocomplete</label>
                    <input type="checkbox" id="autocomplete" checked>
                </div>
                <div class="suggestions-item">
                    <label for="suggestions">Show Suggestions</label>
                    <input type="checkbox" id="suggestions" checked>
                </div>
                <div class="syntax-highlighting-item">
                    <label for="syntax-highlighting">Syntax Highlighting</label>
                    <input type="checkbox" id="syntax-highlighting" checked>
                </div>
                <div class="line-numbers-item">
                    <label for="line-numbers">Show Line Numbers</label>
                    <input type="checkbox" id="line-numbers" checked>
                </div>
            </div>
            <div class="action-buttons">
                <button class="button" id="save-settings">Save</button>
                <button class="button" id="reset-settings">Reset</button>
                <button class="button" id="back-home" onclick="window.location.href = '../home/index.html';">Back to Home</button>
            </div>
        </main>
        <footer>
            <p>&copy; 2025 A++ IDE. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
